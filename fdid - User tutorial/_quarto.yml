project:
  type: book

book:
  title: "fdid -- User Tutorial"
  sidebar:
    style: docked
    background: light
  chapters:
    - index.qmd
    - 01-start.Rmd
    - 02-main.Rmd
    - 03-visualization.Rmd
    - references.qmd

